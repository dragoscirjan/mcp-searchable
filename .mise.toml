[settings]
experimental = true
lockfile = true

############################################################################
# Tools Configuration                                                      #
############################################################################

[tools]

# Node.js for TypeScript development
node = "22"

# Python and package manager (for linting helpers)
python = "3.11"
uv = "latest"

# CLI Tools
[tools."github:koalaman/shellcheck"]
version = "0.11.0"

[tools."github:PowerShell/PowerShell"]
version = "latest"

[tools."github:koalaman/shellcheck".platforms]
linux-x64 = { asset_pattern = "shellcheck-*.linux.x86_64.tar.xz" }
macos-arm64 = { asset_pattern = "shellcheck-*.darwin.aarch64.tar.xz" }
windows-x64 = { asset_pattern = "shellcheck-*.zip" }

[tools."github:PowerShell/PowerShell".platforms]
linux-x64 = { asset_pattern = "powershell-*-linux-x64.tar.gz" }
macos-arm64 = { asset_pattern = "powershell-*-osx-arm64.tar.gz" }
windows-x64 = { asset_pattern = "PowerShell-*-win-x64.zip" }

############################################################################
# Hooks                                                                    #
############################################################################

[hooks]
postinstall = "{% if os() == 'windows' %}powershell.exe -NoProfile -ExecutionPolicy Bypass -File .scripts/fix-mise-pwsh.ps1{% else %}bash .scripts/fix-mise-pwsh.sh 2>/dev/null{% endif %}"

############################################################################
# Tasks                                                                    #
############################################################################

[tasks.build]
description = "Build project"
run = "npm run build"

[tasks.clean]
description = "Clean all build artifacts"
run = "npm run clean"

[tasks.format]
description = "Format code and fix issues"
run = "npm run format"

[tasks."format:check"]
description = "Check code formatting"
run = "npm run format:check"

[tasks.lint]
description = "Run linter and fix issues"
run = "npm run lint"

[tasks."lint:check"]
description = "Run linter without fixing"
run = "npm run lint:check"

[tasks."duplicate-check"]
description = "Check for duplicate code using jscpd"
run = "npm run duplicate-check"

[tasks.test]
description = "Run tests"
run = "npm run test"

[tasks."test:coverage"]
description = "Generate test coverage report"
run = "npm run test:coverage"

[tasks.validate]
description = "Run CI pipeline for validation"
run = [
  "mise run format",
  "mise run clean",
  "mise run build",
  "mise run lint",
  "mise run duplicate-check",
  "mise run clean",
  "mise run test",
  "mise run docs",
]

[tasks.docs]
description = "Build documentation with MkDocs"
run = "uv run mkdocs build --strict"

[tasks.run]
description = "Run application"
run = "npm run start"

[tasks."deps:sync"]
description = "Install all project dependencies"
depends = ["deps:sync:mise", "deps:sync:npm", "deps:sync:uv"]

[tasks."deps:sync:mise"]
run = "mise install --yes"

[tasks."deps:sync:npm"]
run = "npm install"

[tasks."deps:sync:uv"]
run = "uv sync"

[tasks."deps:clean"]
description = "Clean all project dependencies"
run = [
  "rm -rf node_modules package-lock.json",
  "rm -rf ~/.local/share/mise/installs ~/AppData/mise/installs",
  "rm -rf .venv uv.lock",
]

[tasks."deps:refresh"]
description = "Refresh all project dependencies"
depends = ["deps:refresh:mise", "deps:refresh:npm", "deps:refresh:uv"]

[tasks."deps:refresh:mise"]
run = "mise upgrade"

[tasks."deps:refresh:npm"]
run = ["npm update", "npm audit fix"]

[tasks."deps:refresh:uv"]
run = "uv sync --upgrade"

[tasks."docs:build"]
description = "Build the MkDocs documentation site"
run = "uv run mkdocs build --strict"
env = { NO_MKDOCS_2_WARNING = "1" }

[tasks."docs:serve"]
description = "Serve the MkDocs documentation site locally"
run = "uv run mkdocs serve"
env = { NO_MKDOCS_2_WARNING = "1" }
