name: CI » Release

on:
  workflow_call:
    inputs:
      tag:
        description: Tag for the release (e.g., v1.2.3)
        required: true
        type: string
      prerelease:
        description: Mark as pre-release
        required: false
        type: boolean
        default: false
      skip_build:
        description: Skip build (use existing artifact from same workflow run)
        required: false
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        description: npm token used to publish package
        required: true
      GH_TOKEN:
        description: token used to push docs to Pages repository
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for the release (e.g., v1.2.3)
        required: true
        type: string
      prerelease:
        description: Mark as pre-release
        required: false
        type: boolean
        default: false
      skip_build:
        description: Skip build (use existing artifact from same workflow run)
        required: false
        type: boolean
        default: false

jobs:
  # Build the release artifact
  build:
    name: Build
    if: github.event_name != 'workflow_dispatch' || !inputs.skip_build
    uses: ./.github/workflows/ci.quality.yml
    permissions:
      contents: write
    with:
      runs-on: ubuntu-latest
      jobs: build

  # Publish the release
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: dist-archives
          path: release-assets

      - name: List release assets
        run: |
          echo "Release assets:"
          ls -lah release-assets/

      - name: Read changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "Using generated CHANGELOG.md"
          else
            echo "Release ${{ inputs.tag }}" > CHANGELOG.md
          fi

      - name: Publish to npm
        shell: bash
        run: |
          TARBALL=$(find release-assets -maxdepth 1 -name '*.tgz' | head -n 1)
          if [ -z "$TARBALL" ]; then
            echo "No npm tarball found in release-assets/"
            exit 1
          fi

          echo "Publishing $TARBALL"
          npm publish "$TARBALL" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && needs.release.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build MkDocs
        run: |
          uv sync
          uv run mkdocs build --strict

      - name: Checkout GitHub Pages repository
        uses: actions/checkout@v6
        with:
          repository: dragoscirjan/dragoscirjan.github.io
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: docs-repo

      - name: Deploy docs to mcp-searchable subfolder
        shell: bash
        run: |
          rm -rf docs-repo/mcp-searchable
          cp -R site docs-repo/mcp-searchable

          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-searchable

          if git diff --staged --quiet; then
            echo "No documentation changes to deploy."
          else
            git commit -m "docs(mcp-searchable): update documentation site"
            git push origin main
          fi
